<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BiblioScan · Càmera Mòbil (PaddleOCR)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      background: rgba(0,0,0,0.7);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      z-index: 10;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.active { background: #2ecc71; box-shadow: 0 0 8px #2ecc71; animation: pulse 1.2s infinite; }
    #status-dot.error  { background: #e74c3c; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #camera-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Reticle centrat */
    #reticle {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #reticle svg {
      width: min(80vw, 340px);
      height: min(80vw, 340px);
      opacity: 0.7;
    }

    #fps-label {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4);
      padding: 2px 6px;
      border-radius: 4px;
    }

    #footer {
      background: rgba(0,0,0,0.85);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    #status-text {
      font-size: 0.78rem;
      color: #aaa;
      text-align: center;
      min-height: 1.1em;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 14px 10px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); opacity: 0.85; }

    #btn-start { background: #2ecc71; color: #fff; }
    #btn-scan  { background: #3498db; color: #fff; display: none; }
    #btn-stop  { background: #e74c3c; color: #fff; display: none; }
    #btn-torch { background: #2c3e50; color: #f1c40f; display: none; }

    #quality-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: #888;
    }
    #quality-row label { white-space: nowrap; }
    #quality-slider { flex: 1; accent-color: #3498db; }
    #quality-val { width: 30px; text-align: right; color: #ccc; font-weight: 600; }

    #readability-indicator {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 6px;
      display: none;
      flex-direction: column;
      gap: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #readability-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
      font-weight: 600;
    }
    #readability-text {
      transition: color 0.2s;
    }
    #readability-percent {
      color: #aaa;
    }
    #readability-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    #readability-bar {
      width: 0%;
      height: 100%;
      background: #e74c3c;
      border-radius: 3px;
      transition: width 0.15s, background-color 0.15s;
    }

    canvas { display: none; }
  </style>
  <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "/npm/": "https://cdn.jsdelivr.net/npm/",
      "/npm/@techstark/opencv-js@%5E4.10.0-release.1/+esm": "../opencv_proxy.js?v=3",
      "https://cdn.jsdelivr.net/npm/@techstark/opencv-js@%5E4.10.0-release.1/+esm": "../opencv_proxy.js?v=3",
      "/npm/@techstark/opencv-js@^4.10.0-release.1/+esm": "../opencv_proxy.js?v=3",
      "https://cdn.jsdelivr.net/npm/@techstark/opencv-js@^4.10.0-release.1/+esm": "../opencv_proxy.js?v=3",
      "/npm/@techstark/opencv-js@4.10.0-release.1/+esm": "../opencv_proxy.js?v=3",
      "https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/+esm": "../opencv_proxy.js?v=3"
    }
  }
  </script>
</head>
<body>

<div id="header">
  <h1>📷 Càmera Mòbil (PaddleOCR)</h1>
  <div style="display:flex;align-items:center;gap:8px;font-size:0.75rem;color:#aaa;">
    <span id="conn-label">Desconnectat</span>
    <div id="status-dot"></div>
  </div>
</div>

<div id="camera-wrapper">
  <video id="video" autoplay playsinline muted></video>

  <div id="reticle">
    <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Cantonades de la retícula -->
      <path d="M20 60 L20 20 L60 20" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
      <path d="M140 20 L180 20 L180 60" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
      <path d="M180 140 L180 180 L140 180" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
      <path d="M60 180 L20 180 L20 140" stroke="#2ecc71" stroke-width="4" stroke-linecap="round"/>
      <!-- Línia central -->
      <line x1="20" y1="100" x2="180" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4,6"/>
    </svg>
  </div>

  <div id="fps-label">-- fps</div>
</div>

<div id="footer">
  <div id="status-text">Prem "Iniciar" per connectar la càmera a l'ordinador</div>

  <!-- Indicador de qualitat de text en temps real -->
  <div id="readability-indicator">
    <div id="readability-header">
      <span id="readability-text">Nitidesa: --</span>
      <span id="readability-percent">0%</span>
    </div>
    <div id="readability-bar-container">
      <div id="readability-bar"></div>
    </div>
  </div>

  <div class="btn-row">
    <button id="btn-start">📡 Iniciar transmissió</button>
    <button id="btn-scan">📸 Escanejar portada</button>
    <button id="btn-stop">⏹ Aturar</button>
    <button id="btn-torch">🔦</button>
  </div>

  <div id="quality-row">
    <label>Qualitat:</label>
    <input type="range" id="quality-slider" min="10" max="90" value="40" step="5">
    <span id="quality-val">40%</span>
  </div>

  <canvas id="capture-canvas"></canvas>
</div>

<script>
  // ─── Mock per permetre execució des de protocol file:// ───────────────────────
  if (window.location.protocol === 'file:') {
    const fakeGlobalThis = new Proxy(window, {
      get(target, prop, receiver) {
        if (prop === 'location') {
          return new URL('https://rogroc.github.io/open_library/camera_mobile/index_paddle.html');
        }
        const val = Reflect.get(target, prop, receiver);
        if (typeof val === 'function') {
          return val.bind(target);
        }
        return val;
      }
    });
    Object.defineProperty(window, 'globalThis', {
      value: fakeGlobalThis,
      configurable: true,
      writable: true
    });
  }

  // ─── Configuració ────────────────────────────────────────────────────────────
  function isLocalHostOrIp() {
    const hostname = window.location.hostname;
    return (
      hostname === 'localhost' ||
      hostname === '127.0.0.1' ||
      hostname.startsWith('192.168.') ||
      hostname.startsWith('10.') ||
      hostname.startsWith('172.')
    );
  }

  // Si accedim localment via HTTP (port 8080), redirigim automàticament a HTTPS (port 8443)
  // per complir el requisit del navegador que la càmera exigeix connexió segura.
  if (window.location.protocol === 'http:' && isLocalHostOrIp()) {
    const secureUrl = window.location.href
      .replace('http:', 'https:')
      .replace(':8080', ':8443');
    window.location.href = secureUrl;
  }

  // Detectem si estem en mode de sincronització estàtica (allotjat a GitHub Pages)
  const urlParams = new URLSearchParams(window.location.search);
  const sessionID = urlParams.get('session');
  const isStaticSync = !!sessionID;

  // Al mòbil, el servidor HTTPS corre al port 8443 per permetre accés a la càmera.
  // El port 8080 és HTTP i és per a l'ordinador de treball.
  const SERVER_BASE = window.location.origin.replace(':8080', ':8443');
  const FRAME_ENDPOINT = `${SERVER_BASE}/api/camera-frame`;

  let stream = null;
  let streaming = false;
  let timerId = null;
  let torchEnabled = false;
  let frameCount = 0;
  let lastFpsTime = performance.now();
  let ocrInstance = null;

  const video   = document.getElementById('video');
  const canvas  = document.getElementById('capture-canvas');
  const ctx     = canvas.getContext('2d');
  const btnStart = document.getElementById('btn-start');
  const btnScan  = document.getElementById('btn-scan');
  const btnStop  = document.getElementById('btn-stop');
  const btnTorch = document.getElementById('btn-torch');
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const connLabel  = document.getElementById('conn-label');
  const fpsLabel   = document.getElementById('fps-label');
  const qualitySlider = document.getElementById('quality-slider');
  const qualityVal    = document.getElementById('quality-val');
  
  const readabilityIndicator = document.getElementById('readability-indicator');
  const readabilityText      = document.getElementById('readability-text');
  const readabilityPercent   = document.getElementById('readability-percent');
  const readabilityBar       = document.getElementById('readability-bar');

  // Ajustos inicials segons el mode
  if (isStaticSync) {
    document.getElementById('quality-row').style.display = 'none';
    fpsLabel.style.display = 'none';
    btnStart.textContent = '📸 Engegar Escàner';
    connLabel.textContent = 'Sessió: ' + sessionID;
    statusText.textContent = `Sessió estàtica detectada (${sessionID}). Prem "Engegar Escàner" per començar.`;
  }

  qualitySlider.addEventListener('input', () => {
    qualityVal.textContent = qualitySlider.value + '%';
  });

  // Helper per descarregar fitxers grans mostrant el progrés a la interfície
  async function fetchWithProgress(url, label, statusElement) {
    statusElement.textContent = `⚙️ Connectant per descarregar ${label}...`;
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`Error ${response.status} descarregant ${label} des de: ${url}`);
    }
    
    const contentLength = response.headers.get('content-length');
    const total = contentLength ? parseInt(contentLength, 10) : 0;
    
    if (total === 0) {
      statusElement.textContent = `⚙️ Descarregant ${label} (mida desconeguda)...`;
      const blob = await response.blob();
      return URL.createObjectURL(blob);
    }
    
    const reader = response.body.getReader();
    let loaded = 0;
    const chunks = [];
    
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;
      const pct = Math.round((loaded / total) * 100);
      statusElement.textContent = `⚙️ Descarregant ${label}: ${pct}% (${(loaded / 1024 / 1024).toFixed(1)}MB / ${(total / 1024 / 1024).toFixed(1)}MB)...`;
    }
    
    const blob = new Blob(chunks);
    return URL.createObjectURL(blob);
  }

  // Lazy-inicialitzador de PaddleOCR amb importació dinàmica
  async function getOcrInstance() {
    if (ocrInstance) return ocrInstance;
    console.log("[PaddleOCR] getOcrInstance iniciat al mòbil.");
    statusText.textContent = '⚙️ Inicialitzant: Carregant llibreria PaddleOCR...';
    
    try {
      console.log("[PaddleOCR] Important la llibreria @paddleocr/paddleocr-js...");
      const module = await import('https://cdn.jsdelivr.net/npm/@paddleocr/paddleocr-js@0.3.2/+esm');
      const PaddleOCR = module.PaddleOCR;
      console.log("[PaddleOCR] Llibreria importada correctament.");

      // Resoldre les adreces dels models des del servidor propi o repositori CDN
      const isLocalFile = window.location.protocol === 'file:';
      let detUrl = '';
      let recUrl = '';

      if (!isLocalFile) {
        detUrl = new URL('../models/PP-OCRv5_mobile_det_onnx.tar?t=' + Date.now(), window.location.href).href;
        recUrl = new URL('../models/PP-OCRv5_mobile_rec_onnx.tar?t=' + Date.now(), window.location.href).href;
      } else {
        // Si estem en file://, demanem els fitxers al CDN del repositori de GitHub
        detUrl = 'https://rogroc.github.io/open_library/models/PP-OCRv5_mobile_det_onnx.tar?t=' + Date.now();
        recUrl = 'https://rogroc.github.io/open_library/models/PP-OCRv5_mobile_rec_onnx.tar?t=' + Date.now();
      }
      
      console.log("[PaddleOCR] Rutes resoltes al mòbil:", { detUrl, recUrl });

      // Descarreguem ambdós fitxers mostrant el progrés a la interfície
      console.log("[PaddleOCR] Descarregant model de detecció...");
      const localDetObjectUrl = await fetchWithProgress(detUrl, 'model de detecció (4.8MB)', statusText);
      console.log("[PaddleOCR] Descarregant model de reconeixement...");
      const localRecObjectUrl = await fetchWithProgress(recUrl, 'model de reconeixement (16.7MB)', statusText);

      statusText.textContent = '⚙️ Inicialitzant el motor de xarxa neuronal...';
      console.log("[PaddleOCR] Cridant PaddleOCR.create()...");

      ocrInstance = await PaddleOCR.create({
        lang: 'en', // L'idioma English reconeix tots els caràcters llatins
        ocrVersion: 'PP-OCRv5',
        worker: false, // Usem fil principal per evitar problemes de CORS en treballadors web
        ensureServedFromHttp: () => {}, // Bypassem la comprovació del protocol per permetre proves locals directament en doble clic (file://)
        text_detection_model_name: 'PP-OCRv5_mobile_det',
        text_detection_model_dir: { url: localDetObjectUrl },
        text_recognition_model_name: 'PP-OCRv5_mobile_rec',
        text_recognition_model_dir: { url: localRecObjectUrl },
        ortOptions: {
          backend: 'wasm',
          wasmPaths: 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.24.3/dist/',
          numThreads: 1, // 1 fil per evitar necessitat de COOP/COEP headers i SharedArrayBuffer
          simd: true,
          proxy: false  // Desactiva el Web Worker de proxy intern d'ONNX per evitar bloquejos de CORS/sandbox
        }
      });
      console.log("[PaddleOCR] ocrInstance inicialitzat correctament al mòbil.");

      // Solució Híbrida: PaddleOCR per a detecció, Tesseract per a reconeixement
      if (ocrInstance) {
        // 1. Ampliem les àrees de detecció (polígons) de PaddleOCR amb un marge de 6px mantenint la inclinació original del polígon
        if (ocrInstance.detModel) {
          console.log("[HybridOCR] Configurant ampliació de marges de detecció conservant inclinació (6px)...");
          const originalDetPredict = ocrInstance.detModel.predict;
          ocrInstance.detModel.predict = async function(cv, mats, options) {
            const results = await originalDetPredict.call(ocrInstance.detModel, cv, mats, options);
            const margin = 6;
            results.forEach((res, imgIdx) => {
              if (res && res.boxes) {
                const mat = mats[imgIdx];
                const maxW = mat ? mat.cols : 99999;
                const maxH = mat ? mat.rows : 99999;
                
                res.boxes.forEach(box => {
                  if (box.poly && box.poly.length === 4) {
                    // Modifiquem cadascun dels 4 punts conservant el paral·lelogram original
                    // 0: top-left, 1: top-right, 2: bottom-right, 3: bottom-left
                    box.poly[0][0] = Math.max(0, box.poly[0][0] - margin);
                    box.poly[0][1] = Math.max(0, box.poly[0][1] - margin);
                    
                    box.poly[1][0] = Math.min(maxW, box.poly[1][0] + margin);
                    box.poly[1][1] = Math.max(0, box.poly[1][1] - margin);
                    
                    box.poly[2][0] = Math.min(maxW, box.poly[2][0] + margin);
                    box.poly[2][1] = Math.min(maxH, box.poly[2][1] + margin);
                    
                    box.poly[3][0] = Math.max(0, box.poly[3][0] - margin);
                    box.poly[3][1] = Math.min(maxH, box.poly[3][1] + margin);
                  }
                });
              }
            });
            return results;
          };
        }

        // 2. Estratègia de Màscara mòbil: PaddleOCR detecta polígons, Tesseract llegeix la pàgina sencera
        console.log("[HybridOCR] Estratègia de Màscara mòbil activada.");
        
        if (!window.tesseractParallelWorkersInitialized) {
          console.log("[HybridOCR] Inicialitzant els 2 workers de Tesseract (cat, spa) al mòbil...");
          const [wCat, wSpa] = await Promise.all([
            Tesseract.createWorker('cat'),
            Tesseract.createWorker('spa')
          ]);
          window.tesseractWorkerCat = wCat;
          window.tesseractWorkerSpa = wSpa;
          await Promise.all([
            window.tesseractWorkerCat.setParameters({ tessedit_pageseg_mode: '3' }),
            window.tesseractWorkerSpa.setParameters({ tessedit_pageseg_mode: '3' })
          ]);
          window.tesseractParallelWorkersInitialized = true;
          console.log("[HybridOCR] Workers Tesseract mòbil preparats (PSM 3).");
        }
        
        if (ocrInstance.recModel) {
          ocrInstance.recModel.predict = async function(cv, mats, options) {
            return mats.map(() => ({ text: '__MASK_PENDING__', score: 1.0 }));
          };
        }
      }

      return ocrInstance;
    } catch (err) {
      console.error("[PaddleOCR] Error en getOcrInstance (mòbil):", err);
      statusText.style.color = '#e74c3c';
      statusText.textContent = '❌ Error inicialització: ' + err.message;
      throw err;
    }
  }

  // ─── Inici de la transmissió ─────────────────────────────────────────────────
  btnStart.addEventListener('click', async () => {
    statusText.style.color = '#fff';
    statusText.textContent = 'Sol·licitant accés a la càmera...';
    try {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
      } catch (e) {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        } catch (e2) {
          stream = await navigator.mediaDevices.getUserMedia({ video: true });
        }
      }

      video.srcObject = stream;
      await video.play();

      // Detecta llanterna
      checkTorch();

      streaming = true;
      btnStart.style.display = 'none';
      btnStop.style.display  = '';
      
      if (isStaticSync) {
        btnScan.style.display = 'block';
        connLabel.textContent = 'Enllaçat';
        statusText.textContent = 'Enfoca la portada del llibre i prem "Escanejar portada".';
        
        // Comencem a pre-descarregar els models de PaddleOCR en segon pla per estalviar temps
        getOcrInstance().then(() => {
          console.log("PaddleOCR pre-carregat correctament.");
        }).catch(err => {
          console.error("Error pre-carregant PaddleOCR:", err);
        });
      } else {
        connLabel.textContent = 'Transmetent';
        statusText.textContent = 'Transmetent a l\'ordinador…';
      }
      
      statusDot.className = 'active';
      if (readabilityIndicator) readabilityIndicator.style.display = 'flex';

      scheduleFrame();
    } catch (err) {
      console.error("Error inicialitzant càmera:", err);
      statusDot.className = 'error';
      connLabel.textContent = 'Error';
      statusText.style.color = '#e74c3c';
      statusText.textContent = `Error càmera: ${err.name} - ${err.message}.`;
    }
  });

  btnStop.addEventListener('click', stopStream);

  function stopStream() {
    streaming = false;
    if (timerId) clearTimeout(timerId);
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    video.srcObject = null;

    btnStart.style.display = '';
    btnStop.style.display  = 'none';
    btnScan.style.display  = 'none';
    btnTorch.style.display = 'none';
    statusDot.className = 'error';
    
    if (isStaticSync) {
      connLabel.textContent = 'Sessió: ' + sessionID;
      statusText.textContent = 'Escàner aturat.';
    } else {
      connLabel.textContent = 'Aturat';
      statusText.textContent = 'Transmissió aturada.';
    }
    
    fpsLabel.textContent = '-- fps';
    if (readabilityIndicator) readabilityIndicator.style.display = 'none';
  }

  // ─── Bucle de captura i enviament ────────────────────────────────────────────
  function scheduleFrame() {
    if (!streaming) return;
    
    if (isStaticSync) {
      if (video.readyState >= 2) {
        const vw = video.videoWidth  || 640;
        const vh = video.videoHeight || 480;
        const scale = Math.min(1, 1000 / vw);
        canvas.width  = Math.round(vw * scale);
        canvas.height = Math.round(vh * scale);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        updateReadability(canvas, ctx);
      }
      timerId = setTimeout(scheduleFrame, 100);
    } else {
      captureAndSend().finally(() => {
        if (streaming) {
          const delay = Math.max(50, 1000 / getTargetFps());
          timerId = setTimeout(scheduleFrame, delay);
        }
      });
    }
  }

  function getTargetFps() {
    const q = parseInt(qualitySlider.value);
    return q > 60 ? 5 : q > 40 ? 8 : 12;
  }

  async function captureAndSend() {
    if (video.readyState < 2) return;

    const vw = video.videoWidth  || 640;
    const vh = video.videoHeight || 480;

    const scale = Math.min(1, 1000 / vw);
    canvas.width  = Math.round(vw * scale);
    canvas.height = Math.round(vh * scale);

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    updateReadability(canvas, ctx);

    const quality = parseInt(qualitySlider.value) / 100;

    return new Promise(resolve => {
      canvas.toBlob(async (blob) => {
        if (!blob) return resolve();
        try {
          const res = await fetch(FRAME_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'image/jpeg', 'Content-Length': blob.size },
            body: blob
          });

          if (res.ok) {
            frameCount++;
            updateFps();
            statusDot.className = 'active';
            connLabel.textContent = 'Transmetent';
          } else {
            statusDot.className = 'error';
            connLabel.textContent = 'Error servidor';
          }
        } catch (err) {
          statusDot.className = 'error';
          connLabel.textContent = 'Sense connexió';
          statusText.textContent = 'Error de xarxa: ' + err.message;
        }
        resolve();
      }, 'image/jpeg', quality);
    });
  }

  function updateFps() {
    const now = performance.now();
    const elapsed = (now - lastFpsTime) / 1000;
    if (elapsed >= 1) {
      fpsLabel.textContent = Math.round(frameCount / elapsed) + ' fps';
      frameCount = 0;
      lastFpsTime = now;
    }
  }

  // ─── Llanterna ───────────────────────────────────────────────────────────────
  function checkTorch() {
    const track = stream?.getVideoTracks()[0];
    if (!track) return;
    try {
      const caps = track.getCapabilities();
      if (caps.torch) {
        btnTorch.style.display = '';
      }
    } catch(e) {}
  }

  btnTorch.addEventListener('click', async () => {
    const track = stream?.getVideoTracks()[0];
    if (!track) return;
    torchEnabled = !torchEnabled;
    await track.applyConstraints({ advanced: [{ torch: torchEnabled }] });
    btnTorch.textContent = torchEnabled ? '🔦 ON' : '🔦';
    btnTorch.style.color = torchEnabled ? '#2ecc71' : '#f1c40f';
  });

  // ─── Captura, OCR i Cerca Local (Mode Estàtic) ───────────────────────────────
  async function sendSyncStatus(payload) {
    if (!isStaticSync) return;
    console.log("📡 Mòbil intentant enviar estat d'error a ntfy.sh:", payload);
    try {
      const pubRes = await fetch(`https://ntfy.sh/biblioscan-sync-${sessionID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      console.log(`📡 Resposta de ntfy.sh (enviament estat d'error): Status ${pubRes.status}`);
    } catch (e) {
      console.error("❌ Error de xarxa al mòbil enviant estat a ntfy.sh:", e);
    }
  }

  btnScan.addEventListener('click', async () => {
    if (!streaming || !video || video.readyState < 2) return;
    
    btnScan.disabled = true;
    const oldText = btnScan.textContent;
    btnScan.textContent = '⏳ Processant...';
    statusText.style.color = '#f1c40f';
    statusText.textContent = '⚙️ Capturant fotograma i aplicant filtres...';
    
    try {
      // 1. Capturem el canvas en escala de grisos
      const numPixels = canvas.width * canvas.height;
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      const normalGrays = new Uint8Array(numPixels);
      for (let i = 0; i < numPixels; i++) {
        const r = data[i * 4];
        const g = data[i * 4 + 1];
        const b = data[i * 4 + 2];
        normalGrays[i] = Math.round((r + g + b) / 3);
      }
      
      // 2. Filtre de binarització local d'alt contrast (Bradley-Roth)
      const integralNormal = new Float64Array(numPixels);
      for (let y = 0; y < canvas.height; y++) {
        let sumNormal = 0;
        for (let x = 0; x < canvas.width; x++) {
          const idx = y * canvas.width + x;
          sumNormal += normalGrays[idx];
          if (y === 0) {
            integralNormal[idx] = sumNormal;
          } else {
            integralNormal[idx] = integralNormal[(y - 1) * canvas.width + x] + sumNormal;
          }
        }
      }
      
      const windowSize = Math.max(30, Math.round(canvas.width / 8));
      const halfWin = Math.floor(windowSize / 2);
      const C = 10;
      
      const normalCanvas = document.createElement('canvas');
      normalCanvas.width = canvas.width;
      normalCanvas.height = canvas.height;
      const nCtx = normalCanvas.getContext('2d');
      const nImgData = nCtx.createImageData(canvas.width, canvas.height);
      const nData = nImgData.data;
      
      for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
          const idx = y * canvas.width + x;
          const x0 = Math.max(0, x - halfWin);
          const x1 = Math.min(canvas.width - 1, x + halfWin);
          const y0 = Math.max(0, y - halfWin);
          const y1 = Math.min(canvas.height - 1, y + halfWin);
          
          const count = (x1 - x0 + 1) * (y1 - y0 + 1);
          let sumN = integralNormal[y1 * canvas.width + x1];
          if (y0 > 0) sumN -= integralNormal[(y0 - 1) * canvas.width + x1];
          if (x0 > 0) sumN -= integralNormal[y1 * canvas.width + (x0 - 1)];
          if (x0 > 0 && y0 > 0) sumN += integralNormal[(y0 - 1) * canvas.width + (x0 - 1)];
          
          const avgN = sumN / count;
          const val = (normalGrays[idx] < (avgN - C)) ? 0 : 255;
          const outIdx = idx * 4;
          nData[outIdx] = val;
          nData[outIdx+1] = val;
          nData[outIdx+2] = val;
          nData[outIdx+3] = 255;
        }
      }
      nCtx.putImageData(nImgData, 0, 0);
      
      // 3. Executem OCR localment al mòbil amb PaddleOCR.js
      statusText.textContent = '⚙️ Inicialitzant PaddleOCR (models ~20MB, pot trigar uns segons)...';
      const ocr = await getOcrInstance();
      
      statusText.textContent = '🔍 Detectant àrees de text amb PaddleOCR...';
      const ocrResult = await ocr.predict(canvas, {
        text_det_limit_side_len: 960,
        text_det_limit_type: 'min',
        text_det_thresh: 0.2,
        text_det_box_thresh: 0.4
      });
      const pageResult = ocrResult[0] || {};
      const detectedPolys = (pageResult.items || []).map(item => item.poly);
      
      console.log("PaddleOCR mòbil: regions detectades:", detectedPolys.length);
      
      if (detectedPolys.length === 0) {
        const failMsg = '⚠️ No s\'ha trobat cap text a la portada. Enfoca millor.';
        statusText.style.color = '#e74c3c';
        statusText.textContent = failMsg;
        await sendSyncStatus({ error: true, message: failMsg });
        return;
      }

      // --- ESTRATÈGIA MÀSCARA (mòbil) ---
      statusText.textContent = '🎭 Generant imatge màscara...';

      // Canvas màscara: fons blanc, es dibuixa cada polígon binaritzat (negre sobre blanc)
      const maskCanvas = document.createElement('canvas');
      maskCanvas.width = canvas.width;
      maskCanvas.height = canvas.height;
      const maskCtx = maskCanvas.getContext('2d');
      maskCtx.fillStyle = '#ffffff';
      maskCtx.fillRect(0, 0, maskCanvas.width, maskCanvas.height);

      const srcCtxM = canvas.getContext('2d');
      const PAD_M = 8;
      for (const poly of detectedPolys) {
        if (!poly || poly.length < 3) continue;

        const xs = poly.map(p => p[0]);
        const ys = poly.map(p => p[1]);
        const bx0 = Math.max(0, Math.floor(Math.min(...xs)) - PAD_M);
        const by0 = Math.max(0, Math.floor(Math.min(...ys)) - PAD_M);
        const bx1 = Math.min(canvas.width,  Math.ceil(Math.max(...xs)) + PAD_M);
        const by1 = Math.min(canvas.height, Math.ceil(Math.max(...ys)) + PAD_M);
        const bw = bx1 - bx0; const bh = by1 - by0;
        if (bw <= 0 || bh <= 0) continue;

        const regionData = srcCtxM.getImageData(bx0, by0, bw, bh);
        const d = regionData.data;

        // Convertim a escala de grisos i trobem els percentils 10 i 90 per resoldre el llindar localment
        const grays = new Uint8Array(bw * bh);
        for (let i = 0; i < bw * bh; i++) {
          const r = d[i * 4];
          const g = d[i * 4 + 1];
          const b = d[i * 4 + 2];
          grays[i] = Math.round(0.299 * r + 0.587 * g + 0.114 * b);
        }

        const sortedGrays = new Uint8Array(grays);
        sortedGrays.sort();
        const p10 = sortedGrays[Math.floor(sortedGrays.length * 0.10)];
        const p90 = sortedGrays[Math.floor(sortedGrays.length * 0.90)];
        const threshold = (p10 + p90) / 2;

        // Calculem la brillantor del fons a partir de les vores del polígon
        const borderWidth = Math.max(1, Math.min(4, Math.floor(Math.min(bw, bh) / 6)));
        let sumBg = 0;
        let countBg = 0;
        for (let y = 0; y < bh; y++) {
          for (let x = 0; x < bw; x++) {
            const isBorder = (x < borderWidth || x >= bw - borderWidth || y < borderWidth || y >= bh - borderWidth);
            if (isBorder) {
              sumBg += grays[y * bw + x];
              countBg++;
            }
          }
        }
        const bgBr = countBg > 0 ? (sumBg / countBg) : 128;
        const darkText = bgBr > threshold;

        // Binaritzem de forma adaptativa segons si el text és fosc o clar respecte al fons
        for (let i = 0; i < bw * bh; i++) {
          const gray = grays[i];
          const val = darkText ? (gray < threshold ? 0 : 255) : (gray > threshold ? 0 : 255);
          const dIdx = i * 4;
          d[dIdx] = val;
          d[dIdx+1] = val;
          d[dIdx+2] = val;
          d[dIdx+3] = 255;
        }

        const tmpC = document.createElement('canvas');
        tmpC.width = bw; tmpC.height = bh;
        tmpC.getContext('2d').putImageData(regionData, 0, 0);

        maskCtx.save();
        maskCtx.beginPath();
        const cxp = poly.reduce((s, p) => s + p[0], 0) / poly.length;
        const cyp = poly.reduce((s, p) => s + p[1], 0) / poly.length;
        poly.forEach((pt, idx) => {
          const dx = pt[0] - cxp; const dy = pt[1] - cyp;
          const len = Math.sqrt(dx*dx + dy*dy) || 1;
          const ex = pt[0] + (dx/len)*PAD_M; const ey = pt[1] + (dy/len)*PAD_M;
          if (idx === 0) maskCtx.moveTo(ex, ey); else maskCtx.lineTo(ex, ey);
        });
        maskCtx.closePath();
        maskCtx.clip();
        maskCtx.drawImage(tmpC, bx0, by0);
        maskCtx.restore();
      }

      statusText.textContent = '📖 Llegint text amb Tesseract (pàgina completa)...';
      const [resCat, resSpa] = await Promise.all([
        window.tesseractWorkerCat.recognize(maskCanvas),
        window.tesseractWorkerSpa.recognize(maskCanvas)
      ]);

      const catConf = resCat.data.confidence;
      const spaConf = resSpa.data.confidence;
      const bestRes = catConf >= spaConf ? resCat : resSpa;
      const bestLang = catConf >= spaConf ? 'cat' : 'spa';
      console.log(`[HybridOCR mòbil] cat=${catConf}%, spa=${spaConf}% → triat: ${bestLang}`);

      const tesseractWords = bestRes.data.words || [];
      const words = tesseractWords
        .filter(w => w.confidence > 30 && w.text.trim().length > 0)
        .map(w => ({
          text: w.text.trim(),
          confidence: w.confidence,
          bbox: { x0: w.bbox.x0, y0: w.bbox.y0, x1: w.bbox.x1, y1: w.bbox.y1 }
        }));

      // Mantenim el filtratge per alçada per descartar soroll residual
      const allHeights = words.map(w => w.bbox.y1 - w.bbox.y0);
      const maxWordHeight = allHeights.length > 0 ? Math.max(...allHeights) : 0;
      const heightThreshold = maxWordHeight * 0.15;
      const validWords = words.filter(w =>
        (w.bbox.y1 - w.bbox.y0) >= heightThreshold &&
        w.confidence > 30
      );


      if (validWords.length === 0) {
        const failMsg = '⚠️ Text detectat de baixa qualitat o massa petit.';
        statusText.style.color = '#e74c3c';
        statusText.textContent = failMsg;
        await sendSyncStatus({ error: true, message: failMsg });
        return;
      }

      // Ordenem les paraules de dalt a baix i d'esquerra a dreta per tenir coherència de lectura
      validWords.sort((a, b) => {
        if (Math.abs(a.bbox.y0 - b.bbox.y0) < 15) {
          return a.bbox.x0 - b.bbox.x0;
        }
        return a.bbox.y0 - b.bbox.y0;
      });

      let text = validWords.map(w => w.text).join(' ');

      // Normalització d'artefactes d'OCR (correcció d'errors comuns)
      text = text.replace(/ufia/gi, 'uña')
                 .replace(/fio/gi, 'ño')
                 .replace(/fia/gi, 'ña')
                 .replace(/iriba/gi, 'i riba')
                 .replace(/\brba\b/gi, 'riba')
                 .replace(/ll['’]?imperí?/gi, "i l'imperi")
                 .replace(/il['’]?imperí?/gi, "i l'imperi")
                 .replace(/l['’]?imperí?/gi, "l'imperi");

      // Neteja de paraules de parada (stopwords) per no contaminar la cerca d'Open Library
      const stopwords = new Set(['el', 'la', 'els', 'les', 'un', 'una', 'de', 'del', 'i', 'a', 'en', 'per', 'amb', 'y', 'los', 'las', 'para', 'con', 'the', 'of', 'and', 'in', 'for']);
      const cleanText = text.toLowerCase().replace(/[^\w\sàéèíóòúüçñ]/g, '');
      const ocrWordsList = cleanText.split(/\s+/);
      const keywords = ocrWordsList.filter(w => !stopwords.has(w) && w.length > 2);

      console.log("Paraules clau filtrades per a cerca:", keywords);

      if (keywords.length === 0) {
        const failMsg = '⚠️ Text detectat buit de paraules clau reals.';
        statusText.style.color = '#e74c3c';
        statusText.textContent = failMsg;
        await sendSyncStatus({ error: true, message: failMsg });
        return;
      }

      // Limitem a les 8 primeres paraules clau
      const cleanQuery = keywords.slice(0, 8).join(' ');
      
      // 4. Cerca a Open Library des del mòbil
      statusText.textContent = '🌍 Buscant llibre a Open Library...';
      const searchUrl = `https://openlibrary.org/search.json?q=${encodeURIComponent(cleanQuery)}&limit=20`;
      const res = await fetch(searchUrl);
      if (!res.ok) {
        throw new Error('Error al connectar amb Open Library');
      }
      
      const searchData = await res.json();
      if (!searchData.docs || searchData.docs.length === 0) {
        const failMsg = '⚠️ Cap llibre trobat per aquest text.';
        statusText.style.color = '#e74c3c';
        statusText.textContent = failMsg;
        await sendSyncStatus({ error: true, message: failMsg });
        return;
      }
      
      // Fuzzy overlap
      let bestBook = null;
      let maxScore = -1;
      const ocrWords = new Set(cleanText.split(/\s+/));
      
      for (const doc of searchData.docs) {
        const titleWords = (doc.title || '').toLowerCase().replace(/[^\w\sàéèíóòúüçñ]/g, '').split(/\s+/).filter(w => w.length > 1);
        let titleMatches = 0;
        for (let w of titleWords) {
          if (ocrWords.has(w)) titleMatches++;
        }
        const titleScore = titleWords.length > 0 ? (titleMatches / titleWords.length) : 0;
        
        let authorScore = 0;
        if (doc.author_name && doc.author_name.length > 0) {
          const authorWords = doc.author_name[0].toLowerCase().replace(/[^\w\sàéèíóòúüçñ]/g, '').split(/\s+/).filter(w => w.length > 1);
          let authorMatches = 0;
          for (let w of authorWords) {
            if (ocrWords.has(w)) authorMatches++;
          }
          authorScore = authorWords.length > 0 ? (authorMatches / authorWords.length) : 0;
        }
        
        const score = (titleScore * 0.6) + (authorScore * 0.4);
        if (score > maxScore) {
          maxScore = score;
          bestBook = doc;
        }
      }
      
      if (!bestBook || maxScore < 0.20) {
        const failMsg = `⚠️ Coincidència massa baixa (${Math.round(maxScore * 100)}%). Prova altre cop.`;
        statusText.style.color = '#e74c3c';
        statusText.textContent = failMsg;
        await sendSyncStatus({ error: true, message: failMsg });
        return;
      }
      
      // 5. Enviem el resultat a ntfy.sh
      statusText.textContent = '📡 Sincronitzant llibre amb l\'ordinador...';
      const payload = {
        title: bestBook.title,
        authors: bestBook.author_name ? bestBook.author_name.join(', ') : 'Desconegut',
        publisher: bestBook.publisher ? bestBook.publisher[0] : 'Desconegut',
        publishYear: bestBook.first_publish_year || bestBook.publish_year?.[0] || '',
        isbn: bestBook.isbn ? bestBook.isbn[0] : '',
        place: bestBook.publish_place ? bestBook.publish_place[0] : '',
        subjects: bestBook.subject ? bestBook.subject.slice(0, 3).join(', ') : '',
        score: Math.round(maxScore * 100)
      };
      
      console.log("📡 Mòbil intentant enviar llibre a ntfy.sh:", payload);
      const pubRes = await fetch(`https://ntfy.sh/biblioscan-sync-${sessionID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      console.log(`📡 Resposta de ntfy.sh (enviament llibre): Status ${pubRes.status}`);
      
      if (pubRes.ok) {
        statusText.style.color = '#2ecc71';
        statusText.textContent = `✨ Llibre enviat: "${payload.title}" (${payload.score}% d'èxit)!`;
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      } else {
        throw new Error('Error de connexió PubSub.');
      }
      
    } catch (err) {
      console.error(err);
      const errMsg = '❌ Error: ' + err.message;
      statusText.style.color = '#e74c3c';
      statusText.textContent = errMsg;
      await sendSyncStatus({ error: true, message: errMsg });
    } finally {
      btnScan.disabled = false;
      btnScan.textContent = oldText;
    }
  });

  // ─── Qualitat de Text en Temps Real ──────────────────────────────────────────
  function updateReadability(canvas, ctx) {
    if (!readabilityIndicator) return;
    
    const checkWidth = 120;
    const checkHeight = 120;
    const checkX = Math.round((canvas.width - checkWidth) / 2);
    const checkY = Math.round((canvas.height - checkHeight) / 2);
    
    if (checkX < 0 || checkY < 0) return;
    
    try {
      const imgData = ctx.getImageData(checkX, checkY, checkWidth, checkHeight);
      const data = imgData.data;
      const w = imgData.width;
      const h = imgData.height;
      
      let minGray = 255;
      let maxGray = 0;
      let edgeSum = 0;
      let count = 0;
      
      const grays = new Uint8Array(w * h);
      for (let i = 0; i < data.length; i += 4) {
        const gray = Math.round((data[i] + data[i+1] + data[i+2]) / 3);
        grays[i / 4] = gray;
        if (gray < minGray) minGray = gray;
        if (gray > maxGray) maxGray = gray;
      }
      
      const contrast = maxGray - minGray;
      if (contrast < 40) {
        setReadabilityUI(5, '⚠️ Sense text o massa fosc', '#e74c3c');
        return;
      }
      
      for (let y = 1; y < h - 1; y += 2) {
        for (let x = 1; x < w - 1; x += 2) {
          const idx = y * w + x;
          const val = grays[idx];
          
          const diffX = Math.abs(val - grays[idx + 1]);
          const diffY = Math.abs(val - grays[idx + w]);
          
          if (diffX > 15 || diffY > 15) {
            edgeSum += (diffX + diffY);
            count++;
          }
        }
      }
      
      const edgeDensity = count / ((w * h) / 4);
      const avgEdgeStrength = count > 0 ? (edgeSum / count) : 0;
      
      let focusScore = Math.min(100, Math.round((avgEdgeStrength / 50) * 100));
      let densityScore = Math.min(100, Math.round((edgeDensity / 0.16) * 100));
      
      let score = Math.round((focusScore * 0.6) + (densityScore * 0.4));
      
      if (contrast < 90) {
        score = Math.round(score * (contrast / 90));
      }
      
      score = Math.max(5, Math.min(99, score));
      
      if (score < 40) {
        setReadabilityUI(score, '⚠️ Desenfocat o sense text', '#e74c3c');
      } else if (score < 75) {
        setReadabilityUI(score, '⚡ Enfocant... busca bon angle', '#f39c12');
      } else {
        setReadabilityUI(score, '✨ Nitidesa excel·lent! Fes la foto! ✨', '#2ecc71');
      }
    } catch (e) {}
  }

  function setReadabilityUI(score, label, color) {
    if (readabilityPercent) readabilityPercent.textContent = score + '%';
    if (readabilityText) {
      readabilityText.textContent = label;
      readabilityText.style.color = color;
    }
    if (readabilityBar) {
      readabilityBar.style.width = score + '%';
      readabilityBar.style.backgroundColor = color;
    }
  }
</script>
